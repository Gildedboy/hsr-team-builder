name: Automation E2E

on:
  workflow_dispatch:
    inputs:
      frontend_base_url:
        description: Frontend URL to test
        required: true
        default: https://hsr-team-builder.gilded.dev

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/automation/package-lock.json
      - run: npm ci
        working-directory: tests/automation
      - run: npx playwright install --with-deps chromium
        working-directory: tests/automation
      - run: npm run test:e2e
        working-directory: tests/automation
        env:
          FRONTEND_BASE_URL: ${{ inputs.frontend_base_url }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: automation-e2e-artifacts
          path: |
            tests/automation/playwright-report
            tests/automation/test-results
          if-no-files-found: ignore
