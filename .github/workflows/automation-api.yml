name: Automation API

on:
  pull_request:
    paths:
      - 'packages/backend/**'
      - 'packages/shared/**'
      - 'tests/automation/**'
      - '.github/workflows/automation-api.yml'
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/automation/package-lock.json
      - run: npm ci
        working-directory: tests/automation
      - run: npm run typecheck
        working-directory: tests/automation
      - run: npm run test:api
        working-directory: tests/automation
        env:
          BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL || 'https://api.hsr-team-builder.gilded.dev' }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: automation-api-artifacts
          path: |
            tests/automation/playwright-report
            tests/automation/test-results
          if-no-files-found: ignore
